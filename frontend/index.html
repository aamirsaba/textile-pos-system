<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🏪 Textile POS System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }
        .header h1 { color: #333; }
        .badge {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .status {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: #166534;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .product-card {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-color: #667eea;
        }
        .product-name { font-weight: bold; font-size: 1.1rem; color: #333; }
        .product-price { color: #667eea; font-weight: bold; font-size: 1.3rem; }
        .cart-section {
            margin-top: 30px;
            border-top: 2px solid #e2e8f0;
            padding-top: 20px;
        }
        .cart-items { min-height: 100px; max-height: 300px; overflow-y: auto; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }
        .cart-total {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 15px;
            background: #f8fafc;
            border-radius: 8px;
            margin: 10px 0;
        }
        .btn-checkout {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-checkout:hover { background: #5a67d8; transform: scale(1.02); }
        .btn-clear {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-clear:hover { background: #dc2626; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #333; }
        .stat-label { color: #666; font-size: 0.8rem; }
        .payment-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        .payment-option {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }
        .payment-option.selected {
            border-color: #667eea;
            background: #eef2ff;
        }
        .btn-back {
            background: #64748b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-back:hover { background: #475569; }
        .customer-section {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }
        .customer-section select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🏪 Textile POS System</h1>
                <p class="subtitle">Touch-friendly Point of Sale for Textile Business</p>
            </div>
            <div>
                <a href="admin-dashboard.html" class="btn-back">← Back to Dashboard</a>
                <span class="badge">v1.0</span>
            </div>
        </div>

        <div class="status" id="status">⏳ Loading products...</div>

        <div class="stats" id="stats"></div>

        <div class="customer-section">
            <label style="font-weight:bold;display:block;margin-bottom:8px;">👤 Customer</label>
            <select id="customer-select">
                <option value="walk-in">🚶 Walk-in Customer</option>
                <option value="1">👤 John Doe (₦5,000.00 balance)</option>
                <option value="2">👤 Jane Smith (₦0.00 balance)</option>
                <option value="3">👤 Bob Johnson (₦12,500.00 balance)</option>
            </select>
        </div>

        <h2>📦 Products</h2>
        <div class="product-grid" id="products">
            <div class="loading">Loading products...</div>
        </div>

        <div class="cart-section">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <h2>🛒 Cart</h2>
                <button class="btn-clear" onclick="clearCart()">Clear Cart</button>
            </div>
            <div class="cart-items" id="cart-items">
                <div class="empty-cart">No items in cart. Click a product to add.</div>
            </div>

            <div class="payment-section">
                <label class="payment-option selected" onclick="selectPayment('cash')">
                    <input type="radio" name="payment" value="cash" checked> 💵 Cash
                </label>
                <label class="payment-option" onclick="selectPayment('credit')">
                    <input type="radio" name="payment" value="credit"> 💳 Credit
                </label>
            </div>

            <div class="cart-total" id="cart-total">Total: ₦0.00</div>

            <button class="btn-checkout" id="checkout-btn" onclick="checkout()">Checkout (₦0.00)</button>
        </div>
    </div>

    <!-- Product Selection Modal -->
    <div class="modal-overlay" id="product-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:white;padding:30px;border-radius:20px;max-width:400px;width:90%;">
            <h2 id="modal-product-name">Product Name</h2>
            <p class="modal-subtitle" style="color:#666;margin:10px 0;">How do you want to sell this product?</p>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <button onclick="sellRoll()" style="padding:20px;background:#667eea;color:white;border:none;border-radius:10px;font-size:1.1rem;cursor:pointer;">📦 Roll</button>
                <button onclick="sellMeter()" style="padding:20px;background:#48bb78;color:white;border:none;border-radius:10px;font-size:1.1rem;cursor:pointer;">📏 Meter</button>
            </div>
            <button onclick="closeModal()" style="margin-top:15px;padding:10px;width:100%;background:#e2e8f0;border:none;border-radius:8px;cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script>
        // ============================================
        // ENVIRONMENT DETECTION - CRITICAL
        // ============================================
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_URL = isLocal ? 'http://localhost:5000/api/v1' : 'https://aliceblue-herring-771053.hostingersite.com/api.php/api/v1';
        console.log('Environment:', isLocal ? 'LOCAL' : 'PRODUCTION');
        console.log('API URL:', API_URL);
        // ============================================

        let products = [];
        let cart = [];
        let selectedProduct = null;
        let selectedPayment = 'cash';

        function getToken() {
            return localStorage.getItem('token');
        }

        async function loadProducts() {
            const token = getToken();
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(API_URL + '/products', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();

                if (data.success) {
                    products = data.data;
                    document.getElementById('status').innerHTML = '✅ Connected to backend! Loaded ' + data.count + ' products';
                    renderProducts(products);
                }
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('status').innerHTML = '❌ Failed to connect to backend.';
            }
        }

        function renderProducts(products) {
            const productsHtml = products.map(product => `
                <div class="product-card" onclick="openModal('${product.id}')">
                    <div class="product-name">${product.name}</div>
                    <div class="product-price">₦${parseFloat(product.sellingPrice).toLocaleString()}</div>
                </div>
            `).join('');
            document.getElementById('products').innerHTML = productsHtml;
        }

        function openModal(productId) {
            selectedProduct = products.find(p => p.id === productId);
            if (selectedProduct) {
                document.getElementById('modal-product-name').textContent = selectedProduct.name;
                document.getElementById('product-modal').style.display = 'flex';
            }
        }

        function closeModal() {
            document.getElementById('product-modal').style.display = 'none';
            selectedProduct = null;
        }

        function sellRoll() {
            if (selectedProduct) {
                const price = parseFloat(selectedProduct.sellingPrice);
                const meters = parseFloat(selectedProduct.standardRollLength) || 22.86;
                const totalPrice = price * meters;
                cart.push({
                    id: selectedProduct.id + '-' + Date.now(),
                    name: selectedProduct.name,
                    unit: 'Roll',
                    meters: meters,
                    totalPrice: totalPrice
                });
                renderCart();
                updateTotal();
                closeModal();
            }
        }

        function sellMeter() {
            const meters = prompt('Enter number of meters:', '1');
            if (meters && !isNaN(meters) && parseFloat(meters) > 0) {
                if (selectedProduct) {
                    const price = parseFloat(selectedProduct.sellingPrice);
                    const totalPrice = price * parseFloat(meters);
                    cart.push({
                        id: selectedProduct.id + '-' + Date.now(),
                        name: selectedProduct.name,
                        unit: 'm',
                        meters: parseFloat(meters),
                        totalPrice: totalPrice
                    });
                    renderCart();
                    updateTotal();
                    closeModal();
                }
            }
        }

        function renderCart() {
            const cartContainer = document.getElementById('cart-items');
            if (cart.length === 0) {
                cartContainer.innerHTML = '<div class="empty-cart">No items in cart. Click a product to add.</div>';
                return;
            }
            const cartHtml = cart.map((item, index) => `
                <div class="cart-item">
                    <span>${item.name} - ${item.meters}${item.unit === 'Roll' ? ' Roll' : 'm'}</span>
                    <span style="color:#667eea;font-weight:bold;">₦${item.totalPrice.toLocaleString()}</span>
                </div>
            `).join('');
            cartContainer.innerHTML = cartHtml;
        }

        function updateTotal() {
            const total = cart.reduce((sum, item) => sum + item.totalPrice, 0);
            document.getElementById('cart-total').innerHTML = `Total: ₦${total.toLocaleString()}`;
            document.getElementById('checkout-btn').innerHTML = `Checkout (₦${total.toLocaleString()})`;
        }

        function clearCart() {
            cart = [];
            renderCart();
            updateTotal();
        }

        function selectPayment(method) {
            selectedPayment = method;
            document.querySelectorAll('.payment-option').forEach(el => el.classList.remove('selected'));
            document.querySelector(`.payment-option input[value="${method}"]`).closest('.payment-option').classList.add('selected');
        }

        function checkout() {
            if (cart.length === 0) {
                alert('Cart is empty!');
                return;
            }
            const total = cart.reduce((sum, item) => sum + item.totalPrice, 0);
            alert(`✅ Checkout successful!\n\nTotal: ₦${total.toLocaleString()}\nItems: ${cart.length}\nPayment: ${selectedPayment}\n\nThank you!`);
            clearCart();
        }

        // Load products on page load
        loadProducts();
    </script>
</body>
</html>
